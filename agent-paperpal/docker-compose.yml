version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: paperpal-db
    restart: always
    environment:
      POSTGRES_USER: paperpal
      POSTGRES_PASSWORD: paperpal_secret
      POSTGRES_DB: paperpal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: paperpal-redis
    ports:
      - "6379:6379"

  # ── MinIO (Local S3) ──────────────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: paperpal-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ── MinIO Bucket Creator ──────────────────────────────────────────────────
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb myminio/paperpal-uploads;
      /usr/bin/mc policy set public myminio/paperpal-uploads;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
